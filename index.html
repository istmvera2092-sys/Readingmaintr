<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Reading: Right or Wrong</title>
  <style>
    :root{
      --bg:#0b1220;
      --text:#eef3ff;
      --muted:#a9b5d2;
      --line:rgba(255,255,255,.12);

      --shadow: 0 14px 40px rgba(0,0,0,.35);
      --shadow2: 0 8px 18px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji";
      background:
        url("images/bg.png") center/cover no-repeat fixed,
        radial-gradient(1200px 700px at 20% 0%, rgba(90,168,255,.14), transparent 55%),
        radial-gradient(900px 600px at 90% 15%, rgba(49,210,139,.10), transparent 60%),
        radial-gradient(900px 700px at 50% 110%, rgba(255,77,109,.10), transparent 60%),
        var(--bg);
      color:var(--text);
      display:flex;
      justify-content:center;
      padding:18px;
    }

    .app{
      width:min(980px, 100%);
      display:flex;
      flex-direction:column;
      gap:14px;
      position: relative;
      z-index: 1; /* above snow */
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      border:1px solid var(--line);
      background: #000;
      border-radius:18px;
      box-shadow: var(--shadow2);
    }

    .crests{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .crest-slot{
      width:56px;
      height:56px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.26);
      background: rgba(255,255,255,.04);
      display:grid;
      place-items:center;
      overflow:hidden;
      flex:0 0 auto;
    }

    .crest-slot img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      opacity:.95;
    }

    .stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
    }

    .pill{
      padding:10px 12px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      border-radius:999px;
      font-weight:700;
      letter-spacing:.2px;
      display:flex;
      gap:8px;
      align-items:baseline;
      white-space:nowrap;
    }
    .pill span{color:var(--muted); font-weight:600; font-size:12px;}

    .grid{
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:14px;
    }

    @media (max-width: 860px){
      body{ padding:12px; }
      .grid{grid-template-columns:1fr;}
      .stats{justify-content:flex-start;}
      .crest-slot{ width:48px; height:48px; }
    }

    .card{
      border:1px solid var(--line);
      border-radius:22px;
      background: #000;
      box-shadow: var(--shadow);
      overflow:hidden;
      min-width:0;
    }

    .card-head{
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background: #000;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .title{
      font-size:15px;
      font-weight:800;
      letter-spacing:.3px;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-end;
    }

    label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      letter-spacing:.2px;
    }

    select, button{ font:inherit; }

    select{
      background: #000;
      color: var(--text);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
      outline:none;
      font-weight:700;
    }
    select option{
      background:#000;
      color: var(--text);
    }
    select:focus{box-shadow: 0 0 0 3px rgba(90,168,255,.18);}

    .big-area{
      padding:20px 16px 16px;
      display:flex;
      flex-direction:column;
      gap:14px;
      min-height:360px;
    }

    .word-box{
      background: #070707;
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      padding:18px 16px;
      display:grid;
      place-items:center;
    }
    .word-box.idle{
      background: linear-gradient(180deg, rgba(24, 72, 170, .98), rgba(10, 35, 88, .98));
      border-color: rgba(90,168,255,.45);
    }

    .word{
      font-size: clamp(40px, 6.2vw, 78px);
      font-weight: 900;
      letter-spacing: .5px;
      margin:0;
      user-select:none;
      text-align:center;
      line-height:1.05;
      text-shadow: 0 10px 26px rgba(0,0,0,.35);
      word-break: break-word;
    }

    .sub{
      color: var(--muted);
      font-size: 13px;
      line-height: 1.25;
    }

    .btn-row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }

    .btn{
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      padding:14px 14px;
      font-weight:900;
      letter-spacing:.4px;
      cursor:pointer;
      user-select:none;
      position:relative;
      box-shadow: 0 14px 30px rgba(0,0,0,.35);
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-size: 20px;
      min-height:58px;
      color:#fff;
      touch-action: manipulation;
    }

    .btn::before{
      content:"";
      position:absolute;
      inset: 0;
      background: radial-gradient(400px 120px at 30% 0%, rgba(255,255,255,.22), transparent 60%);
      opacity:.7;
      pointer-events:none;
    }

    .btn:active{ transform: translateY(2px) scale(.99); box-shadow: 0 10px 18px rgba(0,0,0,.35); filter: brightness(.98); }
    .btn:focus{ outline:none; box-shadow: 0 0 0 3px rgba(90,168,255,.20), 0 14px 30px rgba(0,0,0,.35); }

    .btn-good{ background: linear-gradient(180deg, rgba(26, 156, 99, .98), rgba(9, 66, 44, .98)); }
    .btn-bad{  background: linear-gradient(180deg, rgba(214, 33, 54, .98), rgba(102, 10, 22, .98)); }

    .btn-secondary{
      background: linear-gradient(180deg, rgba(255, 204, 0, .98), rgba(204, 153, 0, .98));
      border: 1px solid rgba(0,0,0,.55);
      color: #0b1220;
      box-shadow: 0 10px 18px rgba(0,0,0,.28);
      border-radius:14px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      position: relative;
      overflow: hidden;
      touch-action: manipulation;
    }
    .btn-secondary::before{
      content:"";
      position:absolute;
      inset:0;
      background: radial-gradient(380px 120px at 30% 0%, rgba(255,255,255,.28), transparent 60%);
      opacity:.8;
      pointer-events:none;
    }
    .btn-secondary:active{ transform: translateY(1px); filter: brightness(.98); }
    .btn-secondary:focus{ outline:none; box-shadow: 0 0 0 3px rgba(255, 204, 0, .22), 0 10px 18px rgba(0,0,0,.28); }

    .action-buttons{ display:flex; gap:10px; flex-wrap:wrap; }

    .row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .progress{
      height:10px;
      background: #0b0b0b;
      border:1px solid rgba(255,255,255,.12);
      border-radius:999px;
      overflow:hidden;
    }
    .bar{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, rgba(90,168,255,.9), rgba(49,210,139,.9));
      transition: width .18s linear;
    }

    .log{
      padding:0;
      margin:0;
      list-style:none;
      max-height: 520px;
      overflow:auto;
    }

    .log li{
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.09);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-weight:800;
      letter-spacing:.2px;
      background: #050505;
      animation: pop .18s ease-out;
    }

    .log li:last-child{ border-bottom:none; }

    .tag{
      font-size:12px;
      font-weight:900;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.92);
    }

    .ok{ color: rgba(49,210,139,.98); }
    .no{ color: rgba(255,77,109,.98); }

    .tag.ok{ background: rgba(49,210,139,.12); border-color: rgba(49,210,139,.30); }
    .tag.no{ background: rgba(255,77,109,.12); border-color: rgba(255,77,109,.30); }

    @keyframes pop{ from{ transform: translateY(4px); opacity:.0; } to{ transform: translateY(0); opacity:1; } }

    .hint{
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      padding:2px 6px;
      border:1px solid rgba(255,255,255,.18);
      border-bottom-color: rgba(255,255,255,.10);
      border-radius:8px;
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.92);
      box-shadow: 0 3px 0 rgba(0,0,0,.22);
    }

    .disabled{
      opacity:.55;
      pointer-events:none;
      filter:saturate(.85);
    }

    .flash{ animation: flash .14s ease-in; }
    @keyframes flash{ from{ transform: scale(.995); } to{ transform: scale(1); } }

    .log::-webkit-scrollbar{ width:10px; }
    .log::-webkit-scrollbar-thumb{ background: rgba(255,255,255,.12); border-radius:999px; border:2px solid transparent; background-clip: content-box; }
    .log::-webkit-scrollbar-track{ background: transparent; }

    .snow{
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .snow span{
      position: absolute;
      top: -10vh;
      left: 0;
      width: var(--s);
      height: var(--s);
      border-radius: 50%;
      background: rgba(255,255,255,1);
      filter: blur(0px);
      box-shadow: 0 0 8px rgba(255,255,255,.35);
      opacity: var(--o);
      transform: translateX(var(--x));
      animation: fall var(--d) linear infinite;
    }
    @keyframes fall{
      to{ transform: translateX(var(--x)) translateY(120vh); }
    }

    .toggles{ display:flex; gap:10px; flex-wrap:wrap; }
    .toggle{
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:#000;
      color: rgba(255,255,255,.92);
      font-weight:900;
      cursor:pointer;
      transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
      user-select:none;
      touch-action: manipulation;
      white-space:nowrap;
    }
    .toggle:active{ transform: translateY(1px); filter: brightness(.98); }
    .toggle.on{
      border-color: rgba(90,168,255,.40);
      box-shadow: 0 0 0 3px rgba(90,168,255,.18);
    }
    .toggle.util{
      border-color: rgba(255,255,255,.22);
      opacity:.92;
    }
  </style>
</head>
<body>

  <div class="snow" aria-hidden="true"></div>

  <div class="app">

    <div class="top">
      <div class="crests" aria-label="Hogwarts crests">
        <div class="crest-slot"><img alt="Gryffindor"  src="images/gryffindor.png"></div>
        <div class="crest-slot"><img alt="Slytherin"   src="images/slytherin.png"></div>
        <div class="crest-slot"><img alt="Hufflepuff"  src="images/hufflepuff.png"></div>
        <div class="crest-slot"><img alt="Ravenclaw"   src="images/ravenclaw.png"></div>
      </div>

      <div class="stats">
        <div class="pill" id="scorePill">Score: <strong id="score">0</strong></div>
        <div class="pill">Right: <strong id="rightCount">0</strong> <span>R</span></div>
        <div class="pill">Wrong: <strong id="wrongCount">0</strong> <span>W</span></div>
        <div class="pill">Time: <strong id="timeLeft">—</strong></div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-head">
          <div class="title" id="title">Reading: Right or Wrong</div>

          <div class="controls">
            <div>
              <label id="patternsLabel">Patterns</label><br>
              <div class="toggles" id="patternToggles"></div>
            </div>

            <div>
              <label for="duration">Time</label><br>
              <select id="duration">
                <option value="30">30 sec</option>
                <option value="60" selected>60 sec</option>
                <option value="90">90 sec</option>
              </select>
            </div>

            <div>
              <label>&nbsp;</label><br>
              <div class="action-buttons">
                <button class="btn-secondary" id="startBtn" type="button">Start</button>
                <button class="btn-secondary" id="resetBtn" type="button">Reset</button>
              </div>
            </div>

          </div>
        </div>

        <div class="big-area">
          <div class="word-box" id="wordBox">
            <h1 class="word" id="word">Press Start</h1>
          </div>

          <div class="progress" aria-label="Time progress">
            <div class="bar" id="bar"></div>
          </div>

          <div class="btn-row">
            <button class="btn btn-good disabled" id="rightBtn" type="button" aria-label="Right">RIGHT</button>
            <button class="btn btn-bad  disabled" id="wrongBtn" type="button" aria-label="Wrong">WRONG</button>
          </div>

          <div class="row">
            <div class="sub" id="patternHint">Pattern: —</div>
            <div class="hint">
              Hotkeys:
              <span class="kbd">R</span> Right,
              <span class="kbd">W</span> Wrong,
              <span class="kbd">Space</span> Start/Pause
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <div class="title">Answer history</div>
          <div class="hint">Words below: <span class="ok">green</span> — Right, <span class="no">red</span> — Wrong.</div>
        </div>
        <ul class="log" id="log" aria-label="Word list"></ul>
      </div>
    </div>
  </div>

  <script>
    // ============================
    // HELPERS
    // ============================
    const make = (arr, p) => arr.map(w => ({ w, p }));
    const uniq = (arr) => arr.filter((v,i,a)=>a.indexOf(v)===i);

    // Fisher–Yates shuffle
    function shuffle(a){
      for (let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ============================
    // MODES
    // ============================
    // patterns = your existing pattern-groups mode
    // letters  = special CVC button switches to "letters/sounds" mode (order from the PDF)
    let mode = "patterns";

    // ============================
    // PSEUDO (auto: only when EXACTLY ONE non-CVC group selected)
    // ============================
    const PSEUDO = {
      a_e:["nape","vame","labe","tase","pate","dake","rane","caze","mave","kase","wate","hase","bame","dape","zate","jape","gape","sate","fape","tape"],
      e_e:["sene","fere","mene","rebe","tede","peme","neve","kene","beme","reme","lepe","zene","feme","heve","dese","tefe","seke","peve","mege","vele"],
      i_e:["nime","vile","mife","tibe","sipe","rife","kive","jite","lize","fipe","hime","pive","mive","zine","gike","bive","tine","wive","dime","sine"],
      o_e:["nobe","vone","mote","tobe","sote","dobe","lome","gote","pome","kone","jote","fobe","zote","hobe","rone","bome","cobe","vode","mone","tome"],
      u_e:["nube","vute","mune","tuke","sute","dune","lute","gube","pune","kute","june","fute","zune","hune","rube","bute","cune","vune","mube","tune"],

      ee:["meep","teek","neem","seeg","feen","greep","bleen","sheev","preel","treem","cheem","sleed","steem","weef","dreek","veem","speen","neep","jeen","leek"],
      ie:["pien","tiel","lien","mien","kien","zien","vied","fies","plien","brien","slied","grien","tien","mien","kied","zied","pried","tried","dried","flied"],
      oe:["foe","roe","boe","toed","foes","roes","toes","hoed","toen","foen","roen","boen","toef","roef","foef","boef","joes","koes","loes","noes"],
      ue:["plue","grue","flue","clued","glued","blued","trued","huing","ruing","suing","cuing","truing","gluing","cluing","bluish","trueish","hued","rued","sued","cued"],

      qu:["quab","quep","quim","quop","quut","quemp","quost","squeg","squop","squut","quaff","quolt","quark","quern","quill","quilt","quisk","quash","quend","quand"],

      aw:["nawl","braw","tawn","zawn","plawn","smaw","clawn","drall","graw","thawn","cawn","praw","jawl","traw","blawn","strawn","shawn","rawn","dawn","yawn"],
      al:["talm","yalk","valk","zalk","kalm","salp","talp","dalp","galm","walp","malf","calf","halm","palm","balm","salv","walm","balk","talk","walk"],
      au:["taul","faul","gaud","haud","daul","saul","vaul","zaul","rauf","sauf","paus","laun","caun","gaun","haun","daun","maul","haul","fault","pause"],
      ou:["mout","sout","lound","tound","gound","vout","zout","shound","plound","bround","dround","houn","foun","roun","clout","flout","sprout","stout","round","sound"],

      wr:["wrab","wrep","wrim","wrok","wrup","wreft","wrindle","wrenk","wrack","wreel","wrang","wronk","wrent","wretch","wready","wristle","wraph","wrush","wrisk","wramp"],
      ph:["phap","phep","phim","phop","phut","phane","phote","photal","phograph","phonic","phur","phest","phene","phore","phaser","photeen","phoned","phogram","phabic","phoric"],
      kn:["knab","knep","knim","knop","knut","knall","knash","knill","knost","knarf","knilk","knamp","knish","knerd","kniff","knuff","knand","knold","knarp","knass"],

      th:["thav","thim","thop","thun","thesh","thint","thrum","thrad","thlump","thrist","thand","thock","tharth","thent","tholt","thame","thove","thure","thind","thusk"],
      sh:["shab","shep","shim","shop","shut","shafe","shome","shipe","shote","shune","shank","shend","shind","shond","shund","sharf","sherb","shirf","shorf","shurf"],
      ch:["chab","chep","chim","chop","chut","chake","chome","chipe","chote","chune","chank","chend","chind","chond","chund","cherf","chirf","chorf","churf","chest"],
      ng:["zong","fang","hing","mang","pong","rung","tung","vang","wung","zing","clong","flang","prong","strang","thung","plung","snang","brung","dring","gling"],
      wh:["whap","whep","whim","whop","whut","whote","whune","whend","whint","whond","whund","whisp","whush","whack","whomp","wharf","whirl","whine","wheat","wheel"],

      ar:["zarf","marb","tarb","larp","garp","narb","harf","jarb","carf","parn","tarm","darp","farn","barm","garn","zarn","sark","wark","lark","spark"],
      or:["zorn","lork","torm","morb","sorf","gorn","tork","vorn","dorb","bort","corm","dorn","forb","hork","jort","korn","lorn","morn","porm","sorn"],
      r3:["birn","gerp","nurv","firb","terg","hurm","sirn","derp","kurm","verp","jirb","lerg","murv","pirn","serp","turm","wirn","zerp","yurm","xirn"],

      // NEW: oo
      oo:["boop","goom","nood","voot","zoon","choop","snoop","troon","ploof","groop","moof","loob","foom","doot","koom","woot","stoon","bloof","droop","sloom"],

      // NEW: ai, ay, igh, oa, ea(=ee), ew
      ai:["paim","naid","laip","taim","raig","saif","mait","gaip","daim","haif","vaim","zaip","kaim","faid","wail","bain","cail","dain","hail","jain"],
      ay:["plaiy","braym","frayn","slayp","clayn","traym","spayn","drayp","crayn","flayn","grayn","stayn","prayn","blayp","shayn","whayp","frayt","crayt","slayt","grayt"],
      igh:["nighp","lighm","tighn","sighd","righf","pighk","mighl","fight","hight","bight","dight","night","light","right","sight","wight","tight","might","fight","slight"],
      oa:["moat","goat","boat","toad","road","load","soap","foam","coat","loan","moan","roam","hoax","loaf","oaks","soak","cloak","groan","float","bloat"],
      ea:["bead","meat","team","seat","heap","leap","peach","reach","teach","cheap","clean","dream","cream","steam","beach","leaf","mean","meal","peak","neat"],
      ew:["new","few","chew","stew","blew","grew","threw","screw","flew","drew","brew","skew","renew","review","chewed","stewed","newest","fewest","chewer","stewpan"]
    };

    // ============================
    // PATTERN DETECTION (for exclusivity filter)
    // ============================
    // IMPORTANT: we add ai/ay/igh/oa/ea/ew/oo so they get excluded from other groups unless selected
    const PATTERN_RULES = {
      a_e: /a.e/,
      e_e: /e.e/,
      i_e: /i.e/,
      o_e: /o.e/,
      u_e: /u.e/,

      ee: /ee/,
      ie: /ie/,
      oe: /oe/,
      ue: /ue/,

      qu: /qu/,
      aw: /aw/,
      al: /al/,
      au: /au/,
      ou: /ou/,

      wr: /^wr/,
      ph: /ph/,
      kn: /^kn/,

      th: /th/,
      ng: /ng/,
      sh: /sh/,
      ch: /ch/,
      wh: /^wh/,

      ar: /ar/,
      or: /or/,
      r3: /(ir|er|ur)/,

      // NEW
      ai: /ai/,
      ay: /ay/,
      igh: /igh/,
      oa: /oa/,
      ea: /ea/,
      ew: /ew/,
      oo: /oo/
    };

    function detectPatterns(word){
      const w = String(word).toLowerCase();
      const found = [];
      for (const [key, rx] of Object.entries(PATTERN_RULES)){

      }
      return found;
    }

      const fromKey = wordObj.__groupKey || null;
      const hits = new Set(detectPatterns(word));

      if (fromKey === "cvc"){
        return hits.size === 0;
      }

      const selectedNonCvc = new Set([...selectedSet].filter(k => k !== "cvc"));

      if (fromKey && fromKey !== "cvc" && !hits.has(fromKey)) return false;

      for (const h of hits){
        if (!selectedNonCvc.has(h)) return false;
      }

      return true;
    }

        if (!selectedGroups.has(g.key)) return;

        // real words + mark origin group key
        pool.push(...g.words.map(obj => ({ ...obj, __groupKey: g.key })));

        // pseudo only when exactly ONE selected group, and it has pseudoKey, and it's not CVC
        if (
          soloKey &&
          g.key === soloKey &&
          g.key !== "cvc" &&
          g.pseudoKey &&
          Array.isArray(PSEUDO[g.pseudoKey]) &&
          PSEUDO[g.pseudoKey].length
        ){
          pool.push(
            ...make(PSEUDO[g.pseudoKey], `${g.label} (pseudo)`)
              .map(obj => ({ ...obj, __groupKey: g.key }))
          );
        }
      });

      // hard filter: no extra patterns allowed
      return pool.filter(wObj => isAllowedWord(wObj, selectedGroups));
    }

    // ============================
    // LETTER MODE POOL
    // ============================
    // Build pseudo-words from selected letter/sound chunks.
    function getLetterPool(){
      const picked = [...selectedLetters];
      if (!picked.length) return [];

      // map th2 -> th (display), but keep key in selection
      const normalizeChunk = (c) => (c === "th2" ? "th" : c);

      const consonants = picked
        .filter(k => (LETTER_TILES.find(t => t.k === k)?.t === "C"))
        .map(normalizeChunk);

      const vowels = picked
        .filter(k => {
          const t = LETTER_TILES.find(x => x.k === k)?.t;
          return t === "V";
        })
        .map(normalizeChunk);

      const endings = picked
        .filter(k => (LETTER_TILES.find(t => t.k === k)?.t === "E"))
        .map(normalizeChunk);

      // If user only selects one chunk: show that chunk (for practice)
      if (picked.length === 1){
        const one = normalizeChunk(picked[0]);
        return [{ w: one, p: `Letters: ${one}` }];
      }

      // Generate a reasonable batch of pseudo-words (no meaning needed)
      const out = [];
      const want = 80;

      // helper random
      const r = (arr) => arr[Math.floor(Math.random()*arr.length)];

      // cases:
      // - if we have vowels + consonants -> build CVC-ish: C + V + C (or V + C, C + V, etc.)
      // - if only vowels -> return random vowel combos (2 chunks)
      // - if only consonants -> return random consonant combos (2–3 chunks)
      const addUnique = (w) => {
        if (!out.some(x => x.w === w)) out.push({ w, p: "Letters (pseudo)" });
      };

      if (vowels.length && consonants.length){
        let guard = 0;
        while (out.length < want && guard < 2000){
          guard++;
          const onset = r(consonants);
          const nucleus = r(vowels);
          const codaChoice = Math.random() < 0.7 ? r(consonants) : "";
          const end = endings.length && Math.random() < 0.25 ? r(endings) : "";

          // avoid weird "qu" without vowel: here nucleus exists so it's ok.
          let word = (onset + nucleus + codaChoice + end).replace(/\s+/g,"");
          // basic cleanup: don't allow triple same chunk repeated
          if (/(.)\1\1/.test(word)) continue;
          addUnique(word);
        }
      } else if (vowels.length && !consonants.length){
        let guard = 0;
        while (out.length < Math.min(want, 60) && guard < 1200){
          guard++;
          const a = r(vowels);
          const b = r(vowels);
          if (a === b) continue;
          addUnique(a + b);
        }
      } else {
        // consonants only
        let guard = 0;
        while (out.length < Math.min(want, 60) && guard < 1200){
          guard++;
          const a = r(consonants);
          const b = r(consonants);
          const c = Math.random() < 0.4 ? r(consonants) : "";
          if (a === b) continue;
          addUnique(a + b + c);
        }
      }

      return out;
    }

    // ============================
    // GAME HELPERS
    // ============================
    function setButtonsEnabled(on){
      const cls = 'disabled';
      els.rightBtn.classList.toggle(cls, !on);
      els.wrongBtn.classList.toggle(cls, !on);
    }

    function fmtTime(s){
      const mm = Math.floor(s/60);
      const ss = s%60;
      if (mm <= 0) return `${ss}s`;
      return `${mm}:${String(ss).padStart(2,'0')}`;
    }

    // ✅ NO REPEATS until all words in the selected combo are used
    function chooseNextWord(){
      if (!deck.length){
        rebuildDeck(true);
        if (!deck.length) return { w: (mode === "letters" ? "Select letters" : "Select patterns"), p: "—" };
      }

      let pick = deck.pop();

      // prevent immediate back-to-back repeat on boundary
      if (pick && pick.w === lastWord && deck.length){
        const pick2 = deck.pop();
        deck.unshift(pick);
        pick = pick2;
      }

      lastWord = pick.w;
      return pick;
    }

    function showWord(obj){
      current = obj;
      els.wordBox.classList.remove('flash');
      void els.wordBox.offsetWidth;
      els.word.textContent = obj.w;
      els.patternHint.textContent = `Pattern: ${obj.p}`;
      els.wordBox.classList.add('flash');
    }

    function addLogItem(word, ok){
      const li = document.createElement('li');
      li.className = ok ? 'ok' : 'no';

      const left = document.createElement('div');
      left.textContent = word;

      const tag = document.createElement('div');
      tag.className = `tag ${ok ? 'ok' : 'no'}`;
      tag.textContent = ok ? 'RIGHT' : 'WRONG';

      li.appendChild(left);
      li.appendChild(tag);
      els.log.prepend(li);
    }

    function updateStats(){
      els.score.textContent = String(score);
      els.rightCount.textContent = String(rightCount);
      els.wrongCount.textContent = String(wrongCount);
      els.timeLeft.textContent = running ? fmtTime(remaining) : '—';

      const pct = totalSeconds > 0 ? ((totalSeconds - remaining) / totalSeconds) * 100 : 0;
      els.bar.style.width = `${Math.min(100, Math.max(0, pct))}%`;
    }

    function endGame(){
      running = false;
      paused = false;
      clearInterval(t);
      t = null;
      setButtonsEnabled(false);
      els.startBtn.textContent = 'Start';
      els.word.textContent = "Time's up!";
      els.patternHint.textContent = 'Pattern: —';
      els.wordBox.classList.add('idle');
      updateStats();
    }

    function tick(){
      if (!running || paused) return;
      remaining -= 1;
      if (remaining <= 0){
        remaining = 0;
        updateStats();
        endGame();
        return;
      }
      updateStats();
    }

    // ============================
    // UI: TOGGLES (PATTERNS vs LETTERS)
    // ============================
    function setMode(newMode){
      mode = newMode;

      // stop game immediately so UI is not confusing
      running = false;
      paused = false;
      clearInterval(t);
      t = null;

      deck = [];
      lastDeckKey = "";
      current = null;
      lastWord = "";

      els.log.innerHTML = '';
      els.word.textContent = 'Press Start';
      els.wordBox.classList.add('idle');
      els.patternHint.textContent = 'Pattern: —';
      els.startBtn.textContent = 'Start';
      setButtonsEnabled(false);
      els.bar.style.width = '0%';
      els.timeLeft.textContent = '—';
      updateStats();

      renderToggles();
    }

    function renderToggles(){
      els.toggles.innerHTML = "";

      const mkBtn = (text, cls, onClick) => {
        const b = document.createElement('button');
        b.type = "button";
        b.className = `toggle ${cls || ""}`.trim();
        b.textContent = text;
        b.addEventListener('click', onClick);
        return b;
      };

      if (mode === "patterns"){
        els.title.textContent = "Reading: Right or Wrong";
        els.patternsLabel.textContent = "Patterns";

        const afterChange = () => {
          rebuildDeck(true);
        };

        // ALL / NONE
        els.toggles.appendChild(mkBtn("ALL", "util", () => {
          selectedGroups.clear();
          GROUPS.forEach(g => selectedGroups.add(g.key));
          renderToggles();
          afterChange();
        }));

        els.toggles.appendChild(mkBtn("NONE", "util", () => {
          selectedGroups.clear();
          renderToggles();
          afterChange();
        }));

        GROUPS.forEach(g=>{
          const on = selectedGroups.has(g.key);

          // SPECIAL: CVC -> switch to LETTER MODE (as you asked)
          if (g.key === "cvc"){
            els.toggles.appendChild(mkBtn("CVC → Letters", "util", () => {
              // keep patterns as-is; switch mode
              selectedLetters.clear();
              setMode("letters");
            }));
            return;
          }

          els.toggles.appendChild(mkBtn(g.label, on ? "on" : "", () => {
            if (selectedGroups.has(g.key)) selectedGroups.delete(g.key);
            else selectedGroups.add(g.key);
            renderToggles();
            afterChange();
          }));
        });

        return;
      }

      // LETTER MODE
      els.title.textContent = "CVC Letters Mode";
      els.patternsLabel.textContent = "Letters / Sounds";

      // top util row
      els.toggles.appendChild(mkBtn("← Back", "util", () => {
        setMode("patterns");
      }));

      els.toggles.appendChild(mkBtn("ALL", "util", () => {
        selectedLetters.clear();
        LETTER_TILES.forEach(t => selectedLetters.add(t.k));
        renderToggles();
        rebuildDeck(true);
      }));

      els.toggles.appendChild(mkBtn("NONE", "util", () => {
        selectedLetters.clear();
        renderToggles();
        rebuildDeck(true);
      }));

      // tiles in the exact order from the PDF pages 1–4 :contentReference[oaicite:1]{index=1}
      LETTER_TILES.forEach(t=>{
        const label = t.label || t.k;
        const on = selectedLetters.has(t.k);
        els.toggles.appendChild(mkBtn(label, on ? "on" : "", () => {
          if (selectedLetters.has(t.k)) selectedLetters.delete(t.k);
          else selectedLetters.add(t.k);
          renderToggles();
          rebuildDeck(true);
        }));
      });
    }

    // ============================
    // GAME CONTROL
    // ============================
    function startGame(){
      rebuildDeck(true);

      if (!deck.length){
        els.word.textContent = (mode === "letters") ? "Select letters" : "Select patterns";
        els.patternHint.textContent = "Pattern: —";
        els.wordBox.classList.add('idle');
        setButtonsEnabled(false);
        els.startBtn.textContent = 'Start';
        running = false;
        paused = false;
        updateStats();
        return;
      }

      els.wordBox.classList.remove('idle');

      totalSeconds = Number(els.duration.value);
      remaining = totalSeconds;
      running = true;
      paused = false;

      score = 0;
      rightCount = 0;
      wrongCount = 0;
      lastWord = "";
      els.log.innerHTML = '';

      // new round = new deck (no repeats until exhausted)
      rebuildDeck(true);

      setButtonsEnabled(true);
      els.startBtn.textContent = 'Pause';

      showWord(chooseNextWord());
      updateStats();

      clearInterval(t);
      t = setInterval(tick, 1000);
    }

    function togglePause(){
      if (!running){
        startGame();
        return;
      }
      paused = !paused;
      els.startBtn.textContent = paused ? 'Resume' : 'Pause';
      els.word.textContent = paused ? 'Paused' : (current?.w ?? '—');
      updateStats();
    }

    function resetAll(){
      running = false;
      paused = false;
      clearInterval(t);
      t = null;

      score = 0;
      rightCount = 0;
      wrongCount = 0;
      lastWord = "";
      current = null;

      deck = [];
      lastDeckKey = "";

      els.log.innerHTML = '';
      els.word.textContent = 'Press Start';
      els.wordBox.classList.add('idle');
      els.patternHint.textContent = 'Pattern: —';
      els.startBtn.textContent = 'Start';
      setButtonsEnabled(false);
      els.bar.style.width = '0%';
      els.timeLeft.textContent = '—';
      updateStats();
    }

    function answer(ok){
      if (!running || paused || !current) return;

      addLogItem(current.w, ok);

      if (ok){
        rightCount += 1;
        score += 1;
      } else {
        wrongCount += 1;
      }

      showWord(chooseNextWord());
      updateStats();
    }

    // ============================
    // SNOW
    // ============================
    const snow = document.querySelector('.snow');
    const FLAKES = 60;

    for(let i=0;i<FLAKES;i++){
      const f = document.createElement('span');
      const size = Math.random()*8 + 6;
      const x = Math.random()*100;
      const dur = Math.random()*8 + 7;
      const delay = -Math.random()*dur;
      const opacity = Math.random()*0.35 + 0.65;

      f.style.setProperty('--s', size + 'px');
      f.style.setProperty('--x', x + 'vw');
      f.style.setProperty('--d', dur + 's');
      f.style.setProperty('--o', opacity);
      f.style.animationDelay = delay + 's';

      snow.appendChild(f);
    }

    // ============================
    // EVENTS
    // ============================
    els.startBtn.addEventListener('click', togglePause);
    els.resetBtn.addEventListener('click', resetAll);
    els.rightBtn.addEventListener('click', () => answer(true));
    els.wrongBtn.addEventListener('click', () => answer(false));

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space'){
        e.preventDefault();
        togglePause();
      }
      if (e.key.toLowerCase() === 'r') answer(true);
      if (e.key.toLowerCase() === 'w') answer(false);
    });

    // INIT
    renderToggles();
    resetAll();
  </script>
</body>
</html>
